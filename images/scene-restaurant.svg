<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img" aria-label="Full-service restaurant scene">
  <defs>
    <linearGradient id="r_bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fdf6e6"/>
      <stop offset="1" stop-color="#f3e3b9"/>
    </linearGradient>
    <linearGradient id="r_wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e2a3a"/>
      <stop offset="1" stop-color="#2a3a4e"/>
    </linearGradient>
    <linearGradient id="r_table" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7efd6"/>
      <stop offset="1" stop-color="#e4cf94"/>
    </linearGradient>
    <radialGradient id="r_light" cx="0.5" cy="0.1" r="0.7">
      <stop offset="0" stop-color="#ffe9a0" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ffe9a0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- wall -->
  <rect width="800" height="520" fill="url(#r_bg)"/>
  <rect y="0" width="800" height="280" fill="url(#r_wall)"/>

  <!-- windows -->
  <g opacity="0.35">
    <rect x="60" y="60" width="140" height="140" rx="6" fill="#c8a04e"/>
    <rect x="230" y="60" width="140" height="140" rx="6" fill="#c8a04e"/>
    <rect x="430" y="60" width="140" height="140" rx="6" fill="#c8a04e"/>
    <rect x="600" y="60" width="140" height="140" rx="6" fill="#c8a04e"/>
    <line x1="130" y1="60" x2="130" y2="200" stroke="#1e2a3a" stroke-width="3"/>
    <line x1="300" y1="60" x2="300" y2="200" stroke="#1e2a3a" stroke-width="3"/>
    <line x1="500" y1="60" x2="500" y2="200" stroke="#1e2a3a" stroke-width="3"/>
    <line x1="670" y1="60" x2="670" y2="200" stroke="#1e2a3a" stroke-width="3"/>
  </g>

  <!-- hanging pendant lights -->
  <g>
    <line x1="200" y1="0" x2="200" y2="120" stroke="#c8a04e" stroke-width="2"/>
    <circle cx="200" cy="130" r="14" fill="#c8a04e"/>
    <ellipse cx="200" cy="190" rx="90" ry="70" fill="url(#r_light)"/>
    <line x1="600" y1="0" x2="600" y2="120" stroke="#c8a04e" stroke-width="2"/>
    <circle cx="600" cy="130" r="14" fill="#c8a04e"/>
    <ellipse cx="600" cy="190" rx="90" ry="70" fill="url(#r_light)"/>
  </g>

  <!-- floor separator -->
  <rect y="278" width="800" height="4" fill="#c8a04e" opacity="0.7"/>

  <!-- table -->
  <rect x="120" y="340" width="560" height="20" rx="3" fill="#c8a04e"/>
  <rect x="120" y="360" width="560" height="10" fill="#a07f3a"/>
  <rect x="150" y="370" width="14" height="140" fill="#8b6a30"/>
  <rect x="636" y="370" width="14" height="140" fill="#8b6a30"/>

  <!-- plate, cutlery, wine glass, candle -->
  <g transform="translate(230,300)">
    <ellipse cx="0" cy="40" rx="70" ry="14" fill="#1e2a3a" opacity="0.18"/>
    <circle cx="0" cy="30" r="48" fill="#ffffff" stroke="#1e2a3a" stroke-width="2"/>
    <circle cx="0" cy="30" r="34" fill="none" stroke="#c8a04e" stroke-width="2"/>
    <!-- food -->
    <circle cx="-6" cy="24" r="10" fill="#c8a04e"/>
    <circle cx="12" cy="30" r="8" fill="#a07f3a"/>
    <path d="M-14,34 q10,-4 22,2" stroke="#5a7b3a" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- wine glass -->
  <g transform="translate(420,240)">
    <path d="M-22,0 Q-22,40 0,48 Q22,40 22,0 Z" fill="#c83a4e" opacity="0.85" stroke="#1e2a3a" stroke-width="2"/>
    <path d="M-22,0 Q-22,40 0,48 Q22,40 22,0" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
    <line x1="0" y1="48" x2="0" y2="88" stroke="#1e2a3a" stroke-width="2.5"/>
    <ellipse cx="0" cy="92" rx="24" ry="5" fill="#1e2a3a"/>
  </g>

  <!-- candle -->
  <g transform="translate(560,280)">
    <rect x="-10" y="0" width="20" height="50" fill="#f6e1a2" stroke="#1e2a3a" stroke-width="2"/>
    <line x1="0" y1="-10" x2="0" y2="0" stroke="#1e2a3a" stroke-width="2"/>
    <path d="M0,-30 Q6,-16 0,-10 Q-6,-16 0,-30 Z" fill="#f9a34e"/>
    <path d="M0,-24 Q3,-14 0,-10 Q-3,-14 0,-24 Z" fill="#ffe9a0"/>
  </g>

  <!-- cutlery -->
  <g transform="translate(320,330)" stroke="#1e2a3a" stroke-width="2" fill="#c8a04e">
    <rect x="-2" y="-40" width="4" height="80" rx="2"/>
    <path d="M-6,-40 L-6,-20 M0,-40 L0,-20 M6,-40 L6,-20" stroke="#c8a04e" stroke-width="2"/>
  </g>
  <g transform="translate(120,330)" stroke="#1e2a3a" stroke-width="2" fill="#c8a04e">
    <rect x="-2" y="-40" width="4" height="80" rx="2"/>
    <ellipse cx="0" cy="-30" rx="8" ry="14"/>
  </g>
</svg>
