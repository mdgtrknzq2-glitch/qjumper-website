<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img" aria-label="Cafe and coffee scene">
  <defs>
    <linearGradient id="c_bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fdf6e6"/>
      <stop offset="1" stop-color="#f3e3b9"/>
    </linearGradient>
    <linearGradient id="c_wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a3a4e"/>
      <stop offset="1" stop-color="#1e2a3a"/>
    </linearGradient>
    <linearGradient id="c_cup" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e8dfc9"/>
    </linearGradient>
    <linearGradient id="c_counter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c8a04e"/>
      <stop offset="1" stop-color="#8b6a30"/>
    </linearGradient>
  </defs>

  <!-- backdrop -->
  <rect width="800" height="520" fill="url(#c_bg)"/>
  <rect y="0" width="800" height="300" fill="url(#c_wall)"/>

  <!-- shelves behind bar -->
  <g opacity="0.6">
    <rect x="40" y="70" width="720" height="4" fill="#c8a04e"/>
    <rect x="40" y="150" width="720" height="4" fill="#c8a04e"/>
    <!-- jars -->
    <g fill="#c8a04e" opacity="0.8">
      <rect x="70" y="90" width="20" height="60" rx="3"/>
      <rect x="100" y="90" width="20" height="60" rx="3"/>
      <rect x="130" y="90" width="20" height="60" rx="3"/>
      <rect x="170" y="100" width="26" height="50" rx="3"/>
      <rect x="210" y="100" width="26" height="50" rx="3"/>
      <rect x="260" y="95" width="20" height="55" rx="3"/>
      <rect x="290" y="95" width="20" height="55" rx="3"/>
      <rect x="340" y="90" width="30" height="60" rx="3"/>
      <rect x="400" y="95" width="22" height="55" rx="3"/>
      <rect x="430" y="95" width="22" height="55" rx="3"/>
      <rect x="470" y="90" width="26" height="60" rx="3"/>
      <rect x="520" y="95" width="22" height="55" rx="3"/>
      <rect x="560" y="100" width="30" height="50" rx="3"/>
      <rect x="610" y="90" width="24" height="60" rx="3"/>
      <rect x="650" y="95" width="22" height="55" rx="3"/>
      <rect x="690" y="100" width="26" height="50" rx="3"/>
    </g>
    <!-- cups on second shelf -->
    <g fill="#ffffff" opacity="0.85">
      <rect x="80" y="170" width="24" height="18" rx="2"/>
      <rect x="114" y="170" width="24" height="18" rx="2"/>
      <rect x="148" y="170" width="24" height="18" rx="2"/>
      <rect x="200" y="170" width="24" height="18" rx="2"/>
      <rect x="234" y="170" width="24" height="18" rx="2"/>
      <rect x="310" y="170" width="24" height="18" rx="2"/>
      <rect x="344" y="170" width="24" height="18" rx="2"/>
      <rect x="420" y="170" width="24" height="18" rx="2"/>
      <rect x="540" y="170" width="24" height="18" rx="2"/>
      <rect x="650" y="170" width="24" height="18" rx="2"/>
    </g>
  </g>

  <!-- hanging sign "Cafe" style lamp -->
  <g>
    <line x1="400" y1="0" x2="400" y2="40" stroke="#c8a04e" stroke-width="2"/>
    <rect x="340" y="40" width="120" height="36" rx="4" fill="#c8a04e"/>
    <text x="400" y="65" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#1e2a3a" font-style="italic">café</text>
  </g>

  <!-- counter -->
  <rect x="0" y="300" width="800" height="30" fill="url(#c_counter)"/>
  <rect x="0" y="330" width="800" height="10" fill="#8b6a30"/>
  <rect x="0" y="340" width="800" height="180" fill="#6f5627"/>

  <!-- espresso machine -->
  <g transform="translate(540,220)">
    <rect x="0" y="0" width="160" height="80" rx="6" fill="#c8a04e"/>
    <rect x="10" y="10" width="60" height="22" rx="3" fill="#1e2a3a"/>
    <rect x="90" y="10" width="60" height="22" rx="3" fill="#1e2a3a"/>
    <circle cx="40" cy="55" r="8" fill="#1e2a3a"/>
    <circle cx="120" cy="55" r="8" fill="#1e2a3a"/>
    <!-- portafilter handle -->
    <rect x="30" y="80" width="20" height="12" fill="#1e2a3a"/>
    <rect x="38" y="92" width="4" height="18" fill="#1e2a3a"/>
    <rect x="30" y="110" width="20" height="6" fill="#1e2a3a"/>
    <rect x="110" y="80" width="20" height="12" fill="#1e2a3a"/>
    <rect x="118" y="92" width="4" height="18" fill="#1e2a3a"/>
    <rect x="110" y="110" width="20" height="6" fill="#1e2a3a"/>
  </g>

  <!-- coffee cup with steam -->
  <g transform="translate(170,260)">
    <!-- steam -->
    <path d="M-22,-60 q8,-14 0,-28 q-8,-14 0,-28" stroke="#ffffff" stroke-width="3" fill="none" opacity="0.7" stroke-linecap="round"/>
    <path d="M0,-60 q8,-14 0,-28 q-8,-14 0,-28" stroke="#ffffff" stroke-width="3" fill="none" opacity="0.7" stroke-linecap="round"/>
    <path d="M22,-60 q8,-14 0,-28 q-8,-14 0,-28" stroke="#ffffff" stroke-width="3" fill="none" opacity="0.7" stroke-linecap="round"/>
    <!-- saucer shadow -->
    <ellipse cx="0" cy="40" rx="70" ry="12" fill="#1e2a3a" opacity="0.2"/>
    <!-- saucer -->
    <ellipse cx="0" cy="35" rx="68" ry="11" fill="#ffffff" stroke="#1e2a3a" stroke-width="2"/>
    <!-- cup -->
    <path d="M-44,-30 L44,-30 L38,30 L-38,30 Z" fill="url(#c_cup)" stroke="#1e2a3a" stroke-width="2"/>
    <ellipse cx="0" cy="-30" rx="44" ry="10" fill="#6f4a1f" stroke="#1e2a3a" stroke-width="2"/>
    <!-- foam heart -->
    <path d="M-10,-34 q-6,-10 -16,0 q-10,10 16,18 q26,-8 16,-18 q-10,-10 -16,0 Z" fill="#f6e1a2"/>
    <!-- handle -->
    <path d="M44,-20 q32,0 32,22 q0,22 -32,22" fill="none" stroke="#1e2a3a" stroke-width="3"/>
  </g>

  <!-- pastry display -->
  <g transform="translate(340,270)">
    <rect x="-70" y="0" width="140" height="40" rx="4" fill="#ffffff" stroke="#1e2a3a" stroke-width="2" opacity="0.95"/>
    <!-- croissants -->
    <path d="M-55,25 q-6,-18 6,-18 q12,0 12,18 Z" fill="#c8a04e" stroke="#1e2a3a" stroke-width="1.5"/>
    <path d="M-25,25 q-6,-18 6,-18 q12,0 12,18 Z" fill="#c8a04e" stroke="#1e2a3a" stroke-width="1.5"/>
    <path d="M8,25 q-6,-18 6,-18 q12,0 12,18 Z" fill="#a07f3a" stroke="#1e2a3a" stroke-width="1.5"/>
    <path d="M38,25 q-6,-18 6,-18 q12,0 12,18 Z" fill="#c8a04e" stroke="#1e2a3a" stroke-width="1.5"/>
  </g>

  <!-- small plant -->
  <g transform="translate(740,270)">
    <rect x="-16" y="0" width="32" height="30" rx="2" fill="#1e2a3a"/>
    <path d="M0,0 q-14,-22 -24,-34 M0,0 q4,-26 -4,-42 M0,0 q14,-22 24,-34" stroke="#5a7b3a" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>

  <!-- floorboards hint -->
  <g stroke="#8b6a30" stroke-width="1" opacity="0.4">
    <line x1="0" y1="430" x2="800" y2="430"/>
    <line x1="0" y1="470" x2="800" y2="470"/>
    <line x1="0" y1="510" x2="800" y2="510"/>
  </g>
</svg>
