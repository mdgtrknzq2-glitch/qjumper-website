    <radialGradient id="b_lamp" cx="0.5" cy="0.1" r="0.7">
      <stop offset="0" stop-color="#ffe9a0" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#ffe9a0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- backdrop -->
