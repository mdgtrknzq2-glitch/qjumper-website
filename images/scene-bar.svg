      <path d="M-18,0 Q-18,30 0,36 Q18,30 18,0 Z" fill="#c83a4e" opacity="0.85" stroke="#1e2a3a" stroke-width="2"/>
      <line x1="0" y1="36" x2="0" y2="70" stroke="#1e2a3a" stroke-width="2"/>
      <ellipse cx="0" cy="72" rx="20" ry="4" fill="#1e2a3a"/>
