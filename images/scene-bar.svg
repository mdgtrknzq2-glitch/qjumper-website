<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img" aria-label="Bar and drinks scene">
  <defs>
    <linearGradient id="b_wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e2a3a"/>
      <stop offset="1" stop-color="#2a3a4e"/>
    </linearGradient>
    <linearGradient id="b_counter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c8a04e"/>
      <stop offset="1" stop-color="#8b6a30"/>
