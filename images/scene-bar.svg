    <path d="M-30,0 Q-22,-12 -14,-4 Q-6,-16 2,-6 Q10,-18 18,-4 Q26,-12 30,0 Z" fill="#ffffff" stroke="#1e2a3a" stroke-width="2"/>
    <!-- handle -->
    <path d="M30,10 q22,4 22,30 q0,26 -22,30" fill="none" stroke="#1e2a3a" stroke-width="3"/>
    <!-- bubbles -->
    <circle cx="-14" cy="30" r="2" fill="#ffffff" opacity="0.6"/>
    <circle cx="8" cy="50" r="2" fill="#ffffff" opacity="0.6"/>
    <circle cx="-8" cy="60" r="2" fill="#ffffff" opacity="0.6"/>
  </g>

  <!-- wine bottle & glass -->
