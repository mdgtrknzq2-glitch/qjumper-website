    <path d="M-12,0 L-12,-80 L-8,-84 L-8,-110 L8,-110 L8,-84 L12,-80 L12,0 Z" fill="#5a7b3a" stroke="#1e2a3a" stroke-width="2"/>
    <rect x="-12" y="-40" width="24" height="30" fill="#c8a04e"/>
    <!-- glass beside -->
