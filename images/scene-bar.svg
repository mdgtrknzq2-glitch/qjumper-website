      <rect x="-20" y="0" width="40" height="8" rx="2" fill="#c8a04e"/>
      <rect x="-4" y="8" width="8" height="60" fill="#1e2a3a"/>
      <rect x="-18" y="68" width="36" height="6" fill="#1e2a3a"/>
