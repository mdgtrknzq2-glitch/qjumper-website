  <rect x="0" y="320" width="800" height="8" fill="#8b6a30"/>
  <rect x="0" y="328" width="800" height="192" fill="#6f5627"/>

  <!-- cocktail glass -->
  <g transform="translate(260,230)">
    <path d="M-40,0 L40,0 L0,55 Z" fill="#f9a34e" opacity="0.9" stroke="#1e2a3a" stroke-width="2"/>
    <path d="M-40,0 L40,0" stroke="#1e2a3a" stroke-width="2"/>
    <line x1="0" y1="55" x2="0" y2="90" stroke="#1e2a3a" stroke-width="2"/>
    <ellipse cx="0" cy="92" rx="30" ry="5" fill="#1e2a3a"/>
    <!-- olive/garnish -->
    <circle cx="26" cy="-4" r="5" fill="#5a7b3a" stroke="#1e2a3a" stroke-width="1.5"/>
    <line x1="26" y1="-4" x2="10" y2="30" stroke="#1e2a3a" stroke-width="1.5"/>
  </g>

  <!-- beer mug -->
  <g transform="translate(420,240)">
    <rect x="-30" y="0" width="60" height="80" fill="#f9c74e" stroke="#1e2a3a" stroke-width="2"/>
