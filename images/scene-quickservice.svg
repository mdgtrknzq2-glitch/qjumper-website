<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img" aria-label="Quick service counter and meal">
  <defs>
    <linearGradient id="q_bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fdf6e6"/>
      <stop offset="1" stop-color="#f3e3b9"/>
    </linearGradient>
    <linearGradient id="q_wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e2a3a"/>
      <stop offset="1" stop-color="#2a3a4e"/>
    </linearGradient>
    <linearGradient id="q_bun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e4bd6a"/>
      <stop offset="1" stop-color="#a07f3a"/>
    </linearGradient>
    <linearGradient id="q_tray" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d86a3a"/>
      <stop offset="1" stop-color="#b94e24"/>
    </linearGradient>
  </defs>

  <!-- backdrop -->
  <rect width="800" height="520" fill="url(#q_bg)"/>
  <rect y="0" width="800" height="260" fill="url(#q_wall)"/>

  <!-- menu board -->
  <g transform="translate(60,40)">
    <rect x="0" y="0" width="680" height="160" rx="6" fill="#0f1722" stroke="#c8a04e" stroke-width="2"/>
    <text x="20" y="32" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#c8a04e">MENU</text>
    <g font-family="Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.9">
      <text x="20" y="64">Classic Burger</text>
      <text x="200" y="64">$9.50</text>
      <text x="20" y="88">Double Stack</text>
      <text x="200" y="88">$12.90</text>
      <text x="20" y="112">Crispy Chicken</text>
      <text x="200" y="112">$10.50</text>
      <text x="20" y="136">Loaded Fries</text>
      <text x="200" y="136">$7.50</text>
    </g>
    <g font-family="Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.9">
      <text x="360" y="64">Combo Meal</text>
      <text x="560" y="64">$14.90</text>
      <text x="360" y="88">Kids Meal</text>
      <text x="560" y="88">$8.50</text>
      <text x="360" y="112">Shake</text>
      <text x="560" y="112">$5.90</text>
      <text x="360" y="136">Soft Drink</text>
      <text x="560" y="136">$3.50</text>
    </g>
    <!-- little illustrations -->
    <circle cx="640" cy="50" r="16" fill="#c8a04e"/>
    <rect x="628" y="48" width="24" height="4" fill="#1e2a3a"/>
    <rect x="628" y="56" width="24" height="4" fill="#5a7b3a"/>
  </g>

  <!-- counter -->
  <rect x="0" y="260" width="800" height="20" fill="#c8a04e"/>
  <rect x="0" y="280" width="800" height="240" fill="#f7efd6"/>
  <rect x="0" y="280" width="800" height="6" fill="#8b6a30" opacity="0.4"/>

  <!-- POS terminal -->
  <g transform="translate(80,300)">
    <rect x="0" y="0" width="130" height="90" rx="4" fill="#1e2a3a"/>
    <rect x="8" y="8" width="114" height="60" rx="2" fill="#c8a04e"/>
    <line x1="8" y1="22" x2="122" y2="22" stroke="#1e2a3a" stroke-width="1"/>
    <text x="65" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1e2a3a">$14.90</text>
    <rect x="20" y="74" width="20" height="10" rx="1" fill="#c8a04e"/>
    <rect x="45" y="74" width="20" height="10" rx="1" fill="#c8a04e"/>
    <rect x="70" y="74" width="20" height="10" rx="1" fill="#c8a04e"/>
    <rect x="95" y="74" width="20" height="10" rx="1" fill="#c83a4e"/>
    <!-- base -->
    <rect x="-6" y="90" width="142" height="8" fill="#1e2a3a"/>
  </g>

  <!-- tray with burger, fries, drink -->
  <g transform="translate(420,310)">
    <!-- tray shadow -->
    <ellipse cx="150" cy="180" rx="200" ry="14" fill="#1e2a3a" opacity="0.15"/>
    <!-- tray -->
    <rect x="0" y="0" width="300" height="180" rx="10" fill="url(#q_tray)" stroke="#1e2a3a" stroke-width="2"/>
    <rect x="10" y="10" width="280" height="160" rx="6" fill="#fdf6e6" opacity="0.7"/>

    <!-- burger -->
    <g transform="translate(80,60)">
      <ellipse cx="0" cy="50" rx="60" ry="10" fill="#1e2a3a" opacity="0.2"/>
      <!-- top bun -->
      <path d="M-50,0 Q-50,-28 0,-28 Q50,-28 50,0 Z" fill="url(#q_bun)" stroke="#1e2a3a" stroke-width="2"/>
      <!-- sesame -->
      <circle cx="-20" cy="-18" r="2" fill="#f6e1a2"/>
      <circle cx="0" cy="-22" r="2" fill="#f6e1a2"/>
      <circle cx="20" cy="-18" r="2" fill="#f6e1a2"/>
      <!-- lettuce -->
      <path d="M-52,4 q10,-6 20,0 q10,6 20,0 q10,-6 20,0 q10,6 20,0 q10,-6 14,0 L52,12 L-52,12 Z" fill="#5a7b3a" stroke="#1e2a3a" stroke-width="1.5"/>
      <!-- cheese -->
      <path d="M-50,14 L50,14 L46,24 L-46,24 Z" fill="#f9c74e" stroke="#1e2a3a" stroke-width="1.5"/>
      <!-- patty -->
      <rect x="-50" y="24" width="100" height="14" rx="2" fill="#6f3a1f" stroke="#1e2a3a" stroke-width="1.5"/>
      <!-- bottom bun -->
      <path d="M-50,38 Q-50,58 0,58 Q50,58 50,38 Z" fill="#a07f3a" stroke="#1e2a3a" stroke-width="2"/>
    </g>

    <!-- fries -->
    <g transform="translate(210,40)">
      <path d="M-30,40 L-26,100 L26,100 L30,40 Z" fill="#c83a4e" stroke="#1e2a3a" stroke-width="2"/>
      <rect x="-34" y="34" width="68" height="14" fill="#c83a4e" stroke="#1e2a3a" stroke-width="2"/>
      <!-- fries poking out -->
      <g fill="#f9c74e" stroke="#1e2a3a" stroke-width="1">
        <rect x="-22" y="4" width="6" height="32"/>
        <rect x="-12" y="-4" width="6" height="40"/>
        <rect x="-2" y="0" width="6" height="36"/>
        <rect x="8" y="-8" width="6" height="44"/>
        <rect x="18" y="6" width="6" height="30"/>
      </g>
    </g>

    <!-- drink cup -->
    <g transform="translate(260,120)">
      <path d="M-20,0 L20,0 L16,40 L-16,40 Z" fill="#ffffff" stroke="#1e2a3a" stroke-width="2"/>
      <rect x="-22" y="-6" width="44" height="10" rx="1" fill="#c8a04e" stroke="#1e2a3a" stroke-width="1.5"/>
      <circle cx="0" cy="-6" r="2" fill="#1e2a3a"/>
      <rect x="-1" y="-24" width="2" height="20" fill="#c83a4e"/>
    </g>
  </g>

  <!-- receipt printer / small icon left of POS -->
  <g transform="translate(250,340)">
    <rect x="0" y="0" width="50" height="40" rx="3" fill="#c8a04e"/>
    <rect x="4" y="40" width="42" height="30" fill="#ffffff" stroke="#1e2a3a" stroke-width="1"/>
    <line x1="10" y1="48" x2="40" y2="48" stroke="#1e2a3a" stroke-width="1"/>
    <line x1="10" y1="54" x2="40" y2="54" stroke="#1e2a3a" stroke-width="1"/>
    <line x1="10" y1="60" x2="30" y2="60" stroke="#1e2a3a" stroke-width="1"/>
  </g>
</svg>
